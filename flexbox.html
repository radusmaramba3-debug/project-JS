
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Times New Roman', Times, serif;
background:#fcfdfd;
}



h2{
text-align:center;
margin:20px;
}



.container{
width:120%;
border:3px solid #2f9ae0;
}



.header{
height:70px;
border:2px solid #2f9ae0;
padding:15px;
font-size:20px;
background:#8e66d3;
text-align:center;
}



.main{
display:flex;
}



.sidebar{
flex:1;
min-width:180px;
background:rgb(116,158,235);
padding:15px;
display:flex;
flex-direction:column;
justify-content:space-between;
border:2px solid #2f9ae0;
}



.content{
flex:3;
min-width:350px;
border:2px solid #2f9ae0;
padding:20px;
display:flex;
flex-wrap:wrap;
gap:10px;
}


.album{
flex:2;
min-width:250px;
border:2px solid #a07cde;
padding:20px;
display:flex;
flex-wrap:wrap;
gap:10px;
}


.footer{
height:60px;
text-align:center;
border:2px solid #2f9ae0;
padding:15px;
background:#8e66d3;
}



.card{
flex:1 1 30%;
background:#c49db3;
color:white;
padding:20px;
border-radius:10px;
text-align:center;
}

.card button{
width:100%;
margin-top:10px;
padding:5px;
}



.foto{
flex:1 1 30%;
background:#c49db3;
padding:5px;
border-radius:10px;
text-align:center;
}

.foto img{
width:100%;
height:100px;
object-fit:cover;
border-radius:10px;
}

button{
padding:8px;
margin-top:10px;
}

/* RESPON */

@media (max-width:900px){

.card{
flex:1 1 45%;
}

.foto{
flex:1 1 45%;
}

}

@media (max-width:600px){

.card{
flex:1 1 100%;
}

.foto{
flex:1 1 100%;
}

}

</style>
</head>
